# ---- AI 协作偏好 ----
AI_协作上下文:
  工作风格: >-
    倾向于有深度、实质性的对话，而非表面。
    看重直接性和效率。将 AI 视为结对编程的伙伴而非随从。
  沟通偏好:
    - 无需冗余的客套话或废话填充
    - 结果需具有结构化和可操作性
    - 双语环境 (中/英) —— 可自由切换
    - 相比原型展示，更喜欢构建真实运行的系统
  当前常用工具:
    - Claude Code (核心编程 Agent)
    - Antigravity (智能编程助手)

